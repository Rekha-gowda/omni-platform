{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center py-5">
    <div class="glass-card border-danger" style="width: 100%; max-width: 500px;">
        <h2 class="fw-bold mb-4 text-danger">Confirm Order</h2>
        <div class="d-flex align-items-center mb-4">
            {% if item.image %}
            <img src="{{ item.image.url }}" class="rounded me-3" style="width: 80px; height: 80px; object-fit: cover;">
            {% endif %}
            <div>
                <h5 class="mb-0">{{ item.name }}</h5>
                <p class="text-muted mb-0">from {{ item.restaurant.name }}</p>
                <p class="text-success fw-bold mb-0">₹{{ item.price }}</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="delivery_name" class="form-label">Full Name</label>
                <input type="text" name="delivery_name" id="delivery_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="delivery_phone" class="form-label">Phone Number</label>
                <input type="tel" name="delivery_phone" id="delivery_phone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="delivery_address" class="form-label">Delivery Address</label>
                <div class="input-group mb-2">
                    <select class="form-select form-select-sm" id="location_preset" onchange="document.getElementById('delivery_address').value = this.value">
                        <option value="" selected disabled>-- Select Quick Location --</option>
                        {% for addr in prev_addresses %}
                        <option value="{{ addr }}">{{ addr }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="getLocation()">📍 Use Current Location</button>
                </div>
                <textarea name="delivery_address" id="delivery_address" class="form-control" rows="3" required placeholder="Enter full address..."></textarea>
            </div>
            <script>
                function getLocation() {
                    const addrField = document.getElementById('delivery_address');
                    if (navigator.geolocation) {
                        addrField.placeholder = "Locating your current address...";
                        navigator.geolocation.getCurrentPosition(
                            async (position) => {
                                const lat = position.coords.latitude;
                                const lon = position.coords.longitude;
                                try {
                                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
                                    const data = await response.json();
                                    const addr = data.address;
                                    const parts = [
                                        addr.house_number || "",
                                        addr.road || addr.suburb || addr.neighbourhood || "",
                                        addr.city_district || addr.mandal || addr.town || "",
                                        addr.city || addr.state_district || "",
                                        addr.state || "",
                                        addr.postcode || ""
                                    ].filter(part => part.trim() !== "");
                                    
                                    addrField.value = parts.length > 0 ? parts.join(', ') : (data.display_name || `Location: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
                                } catch (e) {
                                    addrField.value = `Location: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                                }
                                addrField.placeholder = "Enter full address...";
                            },
                            (error) => {
                                alert("Error getting location: " + error.message + ". Please enter address manually.");
                                addrField.placeholder = "Enter full address...";
                            },
                            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                        );
                    } else {
                        alert("Geolocation is not supported by this browser.");
                    }
                }

                function toggleUPI(show) {
                    const prompt = document.getElementById('upi_prompt');
                    const submitBtn = document.getElementById('submit_btn');
                    if (show) {
                        prompt.classList.remove('d-none');
                        submitBtn.innerText = "Complete Payment & Order";
                        submitBtn.onclick = function(e) {
                            if (!document.getElementById('payment_done').checked) {
                                alert("Please complete the payment first!");
                                e.preventDefault();
                            }
                        };
                    } else {
                        prompt.classList.add('d-none');
                        submitBtn.innerText = "Place Order (Cash on Delivery) - ₹{{ item.price }}";
                        submitBtn.onclick = null;
                    }
                }

                document.addEventListener("DOMContentLoaded", function() {
                    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                    if (!isMobile) {
                        const upiRadio = document.getElementById('pay_upi');
                        if (upiRadio) {
                            upiRadio.disabled = true;
                            upiRadio.parentElement.style.display = 'none';
                            
                            const codRadio = document.getElementById('pay_cod');
                            codRadio.checked = true;
                            codRadio.parentElement.classList.remove('col-6');
                            codRadio.parentElement.classList.add('col-12');
                            
                            toggleUPI(false);
                        }
                    }
                });
            </script>
            <p class="text-muted small mb-4">By placing this order, you agree to our delivery terms.</p>
            <!-- Payment Method Selection -->
            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">Payment Method</label>
                <div class="row g-2">
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="payment_method" id="pay_cod" value="COD" checked onchange="toggleUPI(false)">
                        <label class="btn btn-outline-secondary w-100 rounded-pill btn-sm" for="pay_cod">COD</label>
                    </div>
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="payment_method" id="pay_upi" value="UPI" onchange="toggleUPI(true)">
                        <label class="btn btn-outline-danger w-100 rounded-pill btn-sm" for="pay_upi">UPI</label>
                    </div>
                </div>
            </div>

            <!-- UPI Payment Prompt -->
            <div id="upi_prompt" class="alert alert-danger d-none py-2">
                <p class="mb-1 fw-bold text-center small">📲 Pay to: <span class="text-danger">6303201086</span></p>
                <div class="form-check text-center small">
                    <input class="form-check-input d-inline-block float-none" type="checkbox" id="payment_done">
                    <label class="form-check-label" for="payment_done">Payment completed</label>
                </div>
            </div>

            <button type="submit" id="submit_btn" class="btn btn-danger w-100 rounded-pill py-2 fw-bold">Place Order - ₹{{ item.price }}</button>
        </form>
    </div>
</div>
{% endblock %}
