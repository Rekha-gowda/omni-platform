{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center py-5">
    <div class="glass-card border-warning bg-dark text-white" style="width: 100%; max-width: 600px;">
        <h2 class="fw-bold mb-4 text-warning">Select Seats</h2>
        <div class="mb-4">
            <h5 class="mb-1">{{ show.movie.title }}</h5>
            <p class="mb-1 text-muted">{{ show.theater_name }} &bull; {{ show.show_time|date:"D, M d - h:i A" }}</p>
            <p class="text-success fw-bold mb-0">₹{{ show.price }} per seat (Locks for 3 hours)</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
                {% for seat in seats %}
                <div>
                    <input type="checkbox" class="btn-check" name="seats" id="seat{{ seat.id }}" value="{{ seat.id }}" autocomplete="off" {% if seat.is_locked %}disabled{% endif %}>
                    <label class="btn {% if seat.is_locked %}btn-danger{% else %}btn-outline-warning{% endif %} px-2 py-1" for="seat{{ seat.id }}" style="width: 50px;">{{ seat.seat_identifier }}</label>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 fw-bold text-dark">Add Selected to Cart</button>
        </form>
    </div>
</div>
{% endblock %}
