{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold mb-4">Reset Password</h2>
        <p class="text-center small mb-4">Enter your email address to receive a link to reset your password.</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
