{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card text-center" style="width: 100%; max-width: 400px;">
        <div class="mb-4">
            <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
        </div>
        <h2 class="fw-bold mb-4">Password Reset Complete</h2>
        <p>Your password has been successfully reset. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 rounded-pill mt-3 py-2 fw-bold">Login Now</a>
    </div>
</div>
{% endblock %}
