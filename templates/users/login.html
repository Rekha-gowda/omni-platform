{% extends 'base.html' %}
{% block extra_head %}
<style>
    body {
        background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;
    }
</style>
{% endblock %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 rounded-pill mt-3 py-2 fw-bold">Login</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'register' %}" class="text-decoration-none">Don't have an account? Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
