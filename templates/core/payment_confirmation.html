{% extends 'base.html' %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="glass-card shadow" style="width: 100%; max-width: 500px;">
        <h2 class="fw-bold mb-4 text-center">Checkout & Payment</h2>
        <div class="alert alert-info">
            <p class="mb-0 text-center">Paying for <strong>{{ module }}</strong></p>
            <h3 class="text-center fw-bold mt-2">Total Amount: ₹{{ amount }}</h3>
        </div>
        
        <!-- Mobile UPI Deep Link Section -->
        <div class="d-block d-md-none mb-4">
            <a href="upi://pay?pa=REKHA@UPI&pn=OmniPlatform&am={{ amount }}&cu=INR&tr={{ ref }}" class="btn btn-success w-100 rounded-pill py-3 fw-bold fs-5 mb-2">
                <i class="fas fa-mobile-alt me-2"></i> Pay via UPI App (PhonePe / GPay)
            </a>
            <p class="text-center small text-muted">Click above to open your default payment app.</p>
        </div>

        <form method="post" action="{% url 'payment_confirmation' %}">
            {% csrf_token %}
            <h5 class="mb-3 mt-4">Other Payment Methods:</h5>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="payment_method" id="upi" value="UPI" checked>
                <label class="form-check-label" for="upi">UPI / GPay / PhonePe</label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="payment_method" id="card" value="Card">
                <label class="form-check-label" for="card">Credit / Debit Card</label>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="radio" name="payment_method" id="cod" value="COD">
                <label class="form-check-label" for="cod">Cash on Delivery (COD)</label>
            </div>
            <button class="btn btn-primary w-100 rounded-pill py-3 fw-bold fs-5" type="submit">Complete Payment of ₹{{ amount }}</button>
        </form>
    </div>
</div>
{% endblock %}
